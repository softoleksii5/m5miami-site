<style>
  :root{--ink:#20242E;--soft:#6E6656;--line:#EBE3D4;--white:#fff;--gold:#B0894F;--gold-d:#96703B;
    --sans:'Geist',-apple-system,sans-serif;--mono:'Space Mono',monospace}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:var(--sans);color:var(--ink);min-height:100vh;
    background:#F6F0E5 url('/img/vice_bg.jpg') top center/100% auto no-repeat}
  a{color:inherit;text-decoration:none}
  .wrap{max-width:760px;margin:0 auto;padding:0 22px 70px;position:relative;z-index:2}
  .hbar{display:flex;align-items:center;justify-content:space-between;padding:20px 0}
  .logo{font-family:var(--sans);font-weight:800;font-size:23px;text-shadow:0 1px 12px rgba(246,240,229,.85)}
  .logo b{color:var(--gold)}
  .back{font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--soft);
    text-shadow:0 1px 10px rgba(246,240,229,.85)}
  .back:hover{color:var(--ink)}

  .hero{padding:26px 0 6px}
  .hero h1{font-weight:800;font-size:clamp(31px,5.4vw,46px);letter-spacing:-.03em;line-height:1.03;color:#232733}
  .hero .k{font-family:var(--mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold-d);margin-bottom:12px}
  .hero p{font-size:15px;line-height:1.6;color:#4A4638;margin-top:14px;max-width:620px}

  .bar{margin:26px 0 8px;background:rgba(255,255,255,.72);border:1px solid var(--line);border-radius:14px;padding:15px 18px}
  .bar .bt{display:flex;justify-content:space-between;align-items:baseline;font-family:var(--mono);font-size:11px;
    letter-spacing:.1em;text-transform:uppercase;color:var(--soft)}
  .bar .bt b{font-size:15px;color:var(--gold-d);letter-spacing:0}
  .track{height:7px;background:#EDE6D8;border-radius:20px;margin-top:11px;overflow:hidden}
  .fill{height:100%;width:0;background:linear-gradient(90deg,#C9A25E,#96703B);border-radius:20px;transition:width .35s}
  .done-msg{margin-top:11px;font-size:13.5px;color:#4E6B54;display:none}
  .done-msg.on{display:block}

  .sec{font-family:var(--mono);font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold-d);margin:30px 0 12px}

  .why{background:linear-gradient(135deg,#20242E,#2E3545);color:#D9D5CC;border-radius:16px;padding:20px 22px;font-size:14px;line-height:1.62}
  .why b{color:#fff}
  .why .wh{font-family:var(--mono);font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:#E4C489;margin-bottom:9px}

  .item{background:var(--white);border:1px solid var(--line);border-radius:15px;padding:16px 18px;margin-bottom:11px;
    display:flex;gap:14px;align-items:flex-start;transition:.18s}
  .item.done{background:#F7F9F5;border-color:#D8E6DA}
  .cb{width:25px;height:25px;flex-shrink:0;border:2px solid #CFC7B4;border-radius:8px;cursor:pointer;margin-top:1px;
    display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff;transition:.18s;background:#fff}
  .cb:hover{border-color:var(--gold)}
  .item.done .cb{background:#5C9E6E;border-color:#5C9E6E}
  .it-b{flex:1;min-width:0}
  .it-b h3{font-size:15.5px;font-weight:700;letter-spacing:-.01em}
  .item.done .it-b h3{color:#6E7A70;text-decoration:line-through}
  .it-b p{font-size:13.5px;line-height:1.55;color:#54503F;margin-top:5px}
  .go{display:inline-block;margin-top:11px;font-family:var(--mono);font-size:10.5px;letter-spacing:.08em;
    text-transform:uppercase;color:var(--gold-d);border:1px solid #E4D9C4;background:#FBF7EF;padding:7px 12px;border-radius:9px}
  .go:hover{background:#F4ECDD;color:var(--ink)}
  .key{display:inline-block;margin-top:9px;font-size:12.5px;line-height:1.5;color:#7A5C22;background:#FDF6E7;
    border-left:2px solid var(--gold);padding:7px 11px;border-radius:0 8px 8px 0}
  .how{margin-top:10px}
  .how summary{cursor:pointer;display:inline-block;list-style:none;font-family:var(--mono);font-size:10.5px;
    letter-spacing:.08em;text-transform:uppercase;color:var(--gold-d);border:1px solid #E4D9C4;background:#FBF7EF;
    padding:7px 12px;border-radius:9px}
  .how summary::-webkit-details-marker{display:none}
  .how summary:hover,.how[open] summary{background:#F4ECDD;color:var(--ink)}
  .how ol{margin:11px 0 3px 20px;font-size:13px;line-height:1.6;color:#54503F}
  .how li{margin-bottom:6px}

  .gate{background:var(--white);border:1px solid var(--line);border-radius:16px;padding:24px;margin-top:22px;max-width:440px}
  .gate label{display:block;font-family:var(--mono);font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--soft);margin-bottom:9px}
  .gate input{width:100%;border:1px solid var(--line);border-radius:11px;padding:14px 15px;font-size:14.5px;
    font-family:var(--sans);color:var(--ink)}
  .gate input:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(176,137,79,.14)}
  .gate button{width:100%;margin-top:12px;border:none;border-radius:26px;padding:14px;cursor:pointer;
    font-family:var(--mono);font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:#fff;font-weight:700;
    background:linear-gradient(180deg,#C9A25E,#96703B)}
  .gate button:hover{filter:brightness(1.06)}
  .gate .err{display:none;margin-top:11px;font-size:13px;line-height:1.5;color:#9E4A3A;background:#FBEFEA;
    border-left:2px solid #D0765F;padding:8px 11px;border-radius:0 8px 8px 0}
  .gate .err.on{display:block}
  .foot{margin-top:30px;font-size:13px;line-height:1.6;color:var(--soft);text-align:center}
  .foot a{text-decoration:underline;text-underline-offset:3px}
</style>
</head>

var COMMON = [
  {id:'mail', t:'Зайти в рабочую почту @m5miami.com', p:'Твой ящик имя@m5miami.com уже создан. Это ключ ко всему: кабинет, Drive, Monday — и вся переписка с клиентами идёт с него. Займёт две минуты.',
   how:['Как зайти — короткая инструкция',
     'Открой gmail.com → Sign in. Если уже залогинен в личный Google — нажми на свой аватар → «Добавить аккаунт».',
     'Логин: имя@m5miami.com.',
     'Пароль — временный, Алекс передал его лично. Потерялся — попроси Алекса, он сбросит за минуту. Пароли в чатах не пересылаем никогда.',
     'Google сразу попросит придумать свой пароль — поставь надёжный и сохрани.',

   go:['Открыть Gmail', 'https://mail.google.com/']},
  {id:'tg', t:'Зайти в Telegram «M5 Team»', p:'Сюда падают заявки с сайта и все автоматические сигналы. Система пишет, только когда есть что сказать — пустых отчётов не бывает. Нет сообщений = всё в порядке.', go:['Открыть группу', LINK.tg]},
  {id:'app', t:'Поставить Monday на телефон', p:'Без приложения система работает наполовину: карточки двигают и склад отмечают с телефона, а не с ноутбука.', go:['Скачать', LINK.app]},
  {id:'drive', t:'Открыть Company Drive', p:'Все фото и документы живут здесь. Если чего-то нет в Drive или Monday — считай, что этого не было.', go:['Открыть Drive', LINK.drive]},
  {id:'jin', t:'Задать Jin один вопрос', p:'Jin знает, как устроена M5, и заточен под твою роль. Он не начальник и никому не докладывает — это твой инструмент. Спроси что-нибудь настоящее, из сегодняшнего дня.', go:['Открыть кабинет', '#cab']}
];

var TRACK = {
  /* Фаундерский трек — это НЕ онбординг сотрудника. Это передача штурвала:
     карта построенной машины и рычаги. Никаких шкал и «задач на уровень». */
  founder: {
    lead:'Карта машины, которую мы построили: что она уже делает сама и где в ней твои рычаги — бренд, клиенты, партнёры.',
    why:'Пока мы разговариваем, система работает: заявка с сайта за секунды падает в Telegram и в CRM; лид без ответа 15 минут — бот напоминает в чате, 30 минут — зовёт директора; по понедельникам приходит сводка по скорости ответов; склад сам сигналит, когда пора заказывать; Jin отвечает каждому в команде по его роли. <b>Всё это не требует управления.</b> Единственное, что машина просит от человека — двигать карточку лида, когда взял её в работу.',
    sec:'Твои рычаги',
    items:[
      {id:'sys', t:'Пройти по всей машине — /org', p:'Схема компании — наш манифест: маленькая команда навсегда, рутина на Jin, найм только по триггерам. Каждая карточка кликается — внутри ценность роли и планки. Там же открытая роль General Director с публичными критериями.', go:['Открыть /org', LINK.org]},
      {id:'flow', t:'Увидеть путь заявки своими глазами', p:'Сайт → заявка → секунды → сообщение в Telegram + карточка в CRM в группе «Новые лиды». Отсюда начинается каждый доллар компании. Хочешь — отправь тестовую заявку с сайта и посмотри, как она прилетает.', key:'Взял лид в работу → перетащи карточку из «Новых лидов». Бот перестаёт напоминать. Это единственный ручной жест во всей цепочке.', go:['Открыть CRM', LINK.crm]},
      {id:'crm', t:'Задать стандарт карточки', p:'Стадия, заметка, следующий шаг — на каждой. Команда будет вести карточки так, как ведёшь их ты: твои — эталон. Смысл не в отчётности, а в том, что завтра любой продолжит разговор с того места, где он остановился.', go:['Открыть CRM', LINK.crm]},
      {id:'part', t:'Доска «Партнёры» — твоя территория', p:'Там уже 12 человек. Цель — 10+ активных риэлторов, через которых идут сделки. После каждого касания — отметка в карточке, иначе через месяц никто не вспомнит, о чём договаривались.', go:['Открыть партнёров', LINK.partners]},
      {id:'face', t:'Контент: ты — фронтмен, снимается вся команда', p:'Ты — лицо бренда, но в кадре будут все: Вадим с объектов, каждый новый человек — в своей роли. План, съёмка и производство — работа SMM, каналы уже расписаны на его странице. Твоё в этом — камера, отношения и подкаст.', go:['Каналы SMM', LINK.smmch]}
    ]
  },
  director: {
    lead:'Ты держишь производство: лицензию, пермиты, бригады, качество. Это та часть компании, которую нельзя автоматизировать — поэтому она полностью твоя. Ниже — настройка, после которой система начнёт снимать с тебя бумажную работу.',
    why:'Jin — не сотрудник и не проверяющий. Он никому не докладывает и никого не заменяет. Он ловит заявки, догоняет напоминания, держит Monday и Drive в порядке, считает цифры. Он <b>никогда</b> не трогает лицензию и всё, что под ней подписывается, решения о деньгах и объёме, вкус и живые отношения. На схеме он нарисован слоем <b>под</b> компанией, а не рядом с людьми — потому что это инструмент. Смысл один: чтобы твой день уходил на стройку и людей, а не на отчёты.',
    sec:'Сделать один раз',
    items:[
      {id:'stock', t:'Заполнить склад — это самое важное', p:'Доска и вся автоматика готовы, но пустые. Нужно один раз внести материалы: название, остаток, единицу и минимальный порог. После этого система сама будет писать утром, что заканчивается — и закупка перестанет быть авралом.', key:'Порог — это не «когда кончилось», а «когда пора заказывать с запасом на срок поставки». Поставь честно, иначе алерт придёт поздно.', go:['Открыть склад', LINK.stock]},
      {id:'shoot', t:'Съёмка объекта — 4 кадра каждый визит', p:'До / процесс / после / деталь, сразу в Drive. Это не бюрократия: наш контент для продаж, наше портфолио и наша защита, если клиент заявит, что «было не так». Один визит без фото — дыра в доказательствах. Плюс короткие появления в кадре: контент бренда снимает вся команда, формат подскажет SMM.', go:['Открыть Drive', LINK.drive]},
      {id:'monday', t:'Держать Monday честным', p:'Реальные даты, а не желаемые. Блокер увидел — отметил сразу, а не когда сорвался срок. Система нужна, чтобы проблема всплывала рано, пока она ещё дешёвая.', go:['Мои доски', LINK.monday]},
      {id:'org', t:'Посмотреть оргструктуру и роль выше', p:'Там твоя карточка и одна будущая роль над тобой — General Director (стратегия, маркетинг, продукт). Она не закреплена ни за кем и открывается, когда компания перерастёт ручное управление. Планка написана открыто — чтобы это решение никогда не стало для тебя сюрпризом.', go:['Открыть /org', LINK.org]}
    ]
  },
  smm: {
    lead:'Ты превращаешь контент в подписанные контракты — единственная метрика, по которой здесь меряют соцсети. Ниже — экономика роли и настройка первого месяца.',
    why:'Система уже работает на тебя: заявка с сайта за секунды падает в Telegram и в CRM, бот сам напоминает команде про неотвеченные лиды — тебе не нужно нянчить заявки и собирать отчёты. Контракты из соцсетей считаются по источнику в CRM, так что твой результат виден без скриншотов и презентаций. Jin отвечает тебе по твоей роли: идеи, тексты, цифры — спрашивай. Чего система не умеет — <b>вкус, чувство тренда и камера</b>. Это и есть твоя работа, и поэтому она не автоматизируется.',
    sec:'Сделать один раз',
    items:[
      {id:'pay', t:'Разобрать свою экономику на странице роста', p:'База $2,000/мес — за объём: 16–20 Reels в месяц плюс stories каждый день. Сверху деньги за результат: $50 за лид, дошедший до консультации, и $150 за каждый подписанный контракт из соцсетей. Ретейнер растёт до $2,500 и $3,000, когда соцсети стабильно приносят контракты.', key:'North star — контракты, не просмотры. Просмотры и подписчики — датчик здоровья; уровень и деньги двигают только подписанные контракты.', go:['Моя страница роста', '/growth/?role=smm']},
      {id:'ch', t:'Выучить карту каналов', p:'Core — Instagram, TikTok, YouTube: их покрывает база. Next — Pinterest, Houzz, Google Business, Facebook, LinkedIn: включаем по одному, и при каждом пересматриваем ретейнер — новый канал никогда не значит тихую доп-работу. Открой вкладку Channels и запомни, что в core, а что в очереди.', go:['Вкладка Channels', '/growth/?role=smm']},
      {id:'raw', t:'Запустить поток сырья с команды', p:'Ты не снимаешь всё в одиночку — сырьё даёт вся команда: Влад — фронтмен и лицо бренда, Вадим привозит кадры с объектов. Твоё — план, короткие брифы на съёмку и производство. Сделай раз: напиши каждому, какие кадры нужны от него каждую неделю.', go:['Познакомиться с командой', '/org/']},
      {id:'src', t:'Держать источник лида чистым', p:'Бонусы и уровень считаются по источнику в CRM: пришёл лид из соцсетей — в карточке это должно быть видно. Загляни в CRM и посмотри, как живут карточки лидов.', key:'Нет источника в карточке — контракт из соцсетей не засчитан. Чистый трекинг — твоя страховка, а не бюрократия.', go:['Открыть CRM', 'https://m5miami.monday.com/boards/5100794737']},
      {id:'ach', t:'Выбрать первую ачивку', p:'Разовые бейджи с деньгами: вирусный Reel (100K просмотров) +$100, подкаст (первые 5 выпусков) +$200, рост подписчиков — ступени от $150 до $500. Выбери одну и вплети в контент-план первого месяца — так у плана появляется вершина, а не только объём.'}
    ]
  },

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;');}
var app = document.getElementById('app');

function sha256(s){
  return crypto.subtle.digest('SHA-256', new TextEncoder().encode(s)).then(function(buf){
    var a = new Uint8Array(buf), out = '';
    for (var i=0;i<a.length;i++) out += ('0'+a[i].toString(16)).slice(-2);
    return out;
  });
}

function acceptEmail(email, name){
  return sha256(String(email||'').trim().toLowerCase()).then(function(h){
    var w = HASH2WHO[h];
    if (!w) return false;
    try {
      localStorage.setItem('m5_onb_who', w);
      var m = {}; try { m = JSON.parse(localStorage.getItem('m5_member')||'{}')||{}; } catch(e){}
      m.email = String(email).trim().toLowerCase();
      if (name && !m.name) m.name = name;
      m.role = PERSON[w].cab.replace('/champion','');
      localStorage.setItem('m5_member', JSON.stringify(m));
    } catch (err) {}
    renderTrack(w);
    return true;
  });
}

function onGsi(resp){
  var p = {};
  try { p = JSON.parse(decodeURIComponent(escape(atob(resp.credential.split('.')[1].replace(/-/g,'+').replace(/_/g,'/'))))); } catch(e){}
  acceptEmail(p.email, p.name).then(function(ok){
    var er = document.getElementById('gerr');
    if (!ok && er) er.classList.add('on');
  });
}

function mountEmailForm(){
  var slot = document.getElementById('gslot'); if (!slot) return;
  slot.innerHTML =
    '<form id="gform"><label for="em">Рабочая почта</label>'+
    '<input type="email" id="em" placeholder="имя@m5miami.com" autocomplete="email" required>'+
    '<button type="submit">Открыть мою страницу</button></form>';
  document.getElementById('gform').addEventListener('submit', function(e){
    e.preventDefault();
    acceptEmail(document.getElementById('em').value).then(function(ok){
      if (!ok) document.getElementById('gerr').classList.add('on');
    });
  });
}

/* Встроенные браузеры (Telegram/Instagram/FB открывают ссылки в своём окне) ломают
   Google-вход: попап не может вернуть результат. Там сразу показываем почтовый вход. */
function inWebview(){
  if (location.search.indexOf('wv=1') >= 0) return true; // форс для тестов
  var ua = navigator.userAgent || '';
  if (/FBAN|FB_IAB|Instagram|Line\/|Telegram/i.test(ua)) return true;
  if (/iPhone|iPad|iPod/.test(ua) && !/Safari\//.test(ua)) return true;
  if (/Android/.test(ua) && /; wv\)/.test(ua)) return true;
  return false;
}

function renderGate(showErr){
  var wv = inWebview();
  app.innerHTML =
    '<div class="hero"><div class="k">M5 Start</div><h1>Начнём.</h1>'+
    '<p>Короткая настройка: что уже построено и что нужно сделать один раз. Страница у каждого своя — войди рабочим Google-аккаунтом.</p></div>'+
    '<div class="gate">'+
      '<div id="gslot"><label>Рабочий аккаунт @m5miami.com</label><div id="gbtn"></div></div>'+
      '<div class="err'+(showErr?' on':'')+'" id="gerr">Этот аккаунт не в списке команды. Войди рабочим аккаунтом @m5miami.com — или напиши в «M5 Team», добавим.</div>'+
      (wv ? '<div class="key" style="margin-top:12px">Открыто внутри мессенджера — здесь вход по почте, это нормально.</div>'+
            '<a class="go" style="display:block;text-align:center;margin-top:10px" href="x-safari-https://m5miami.com/onboarding/">Или открой в Safari — там вход одной кнопкой Google →</a>' : '')+
    '</div>';
  if (!GSI_CLIENT || wv) { mountEmailForm(); return; }
  var tries = 0;
  (function wait(){
    if (window.google && google.accounts && google.accounts.id) {
      google.accounts.id.initialize({ client_id: GSI_CLIENT, callback: onGsi });
      google.accounts.id.renderButton(document.getElementById('gbtn'),
        { theme:'outline', size:'large', shape:'pill', text:'continue_with', width:300 });
    } else if (++tries < 80) setTimeout(wait, 50);
    else mountEmailForm(); // GIS не загрузился — запасной ручной ввод
  })();
}

function renderTrack(who){
  var P = PERSON[who] || (who.indexOf('pv_') === 0 ? PREVIEW[who.slice(3)] : null);
  if (!P) { renderGate(false); return; }
  var T = TRACK[P.track];
  var items = P.pv ? T.items : T.items.concat(COMMON), KEY = 'm5_onb_' + who;
  var state = {};
  try { state = JSON.parse(localStorage.getItem(KEY) || '{}'); } catch (e) {}

  function rowHtml(it){
    var d = state[it.id] ? ' done' : '';
    var go = '';
    if (it.go) {
      var href = it.go[1];
      if (href === '#cab') href = P.cab;
      go = '<a class="go" href="' + href + '" target="' + (href.charAt(0)==='/' ? '_self' : '_blank') + '" rel="noopener">' + esc(it.go[0]) + ' →</a>';
    }
    var how = '';
    if (it.how) {
      how = '<details class="how"><summary>' + esc(it.how[0]) + ' →</summary><ol>' +
        it.how.slice(1).map(function(s){ return '<li>' + esc(s) + '</li>'; }).join('') + '</ol></details>';
    }
    return '<div class="item' + d + '" id="row_' + it.id + '">' +
      '<div class="cb" onclick="tog(\'' + it.id + '\')">✓</div>' +
      '<div class="it-b"><h3>' + esc(it.t) + '</h3><p>' + esc(it.p) + '</p>' +
      (it.key ? '<div class="key">' + esc(it.key) + '</div>' : '') + how + go + '</div></div>';
  }

  var isFounderView = !P.pv && P.track === 'founder';
  var pvLinks = ['smm','sales','designer','pm'].map(function(k){
    return (P.pv && who.slice(3) === k)
      ? '<b>' + esc(PREVIEW[k].name) + '</b>'
      : '<a href="#" onclick="return pv(\'' + k + '\')">' + esc(PREVIEW[k].name) + '</a>';
  }).join(' · ');

  app.innerHTML =
    '<div class="hero"><div class="k">' + (P.pv ? 'Предпросмотр · так это увидит новый сотрудник' : esc(P.role)) + '</div>' +
    '<h1>' + (P.pv ? 'Трек роли: ' + esc(P.name) : esc(P.name) + ', начнём.') + '</h1>' +
    '<p>' + esc(T.lead) + '</p></div>' +
    '<div class="bar"><div class="bt"><span>Прогресс</span><b id="pct">0 / ' + items.length + '</b></div>' +
      '<div class="track"><div class="fill" id="fill"></div></div>' +
      '<div class="done-msg" id="dm">Готово. Система настроена — дальше она работает сама.</div></div>' +
    '<div class="sec">Что теперь происходит без тебя</div>' +
    '<div class="why"><div class="wh">Важно понимать</div>' + T.why + '</div>' +
    '<div class="sec">' + esc(T.sec) + '</div>' +
    T.items.map(rowHtml).join('') +
    (P.pv ? '' :
      '<div class="sec">Общее для всех</div>' +
      COMMON.map(rowHtml).join('')) +
    '<div class="foot">' +
      (P.pv
        ? '<a href="#" onclick="return pvBack()">← Вернуться к моему треку</a><br>Другие роли: ' + pvLinks
        : 'Что-то неудобно или лишнее — скажи в «M5 Team». Систему строим под работу, а не работу под систему.' +
          (isFounderView ? '<br>Треки будущих ролей: ' + pvLinks : '') +
          '<br>Это не твоя страница? <a href="#" onclick="return swp()">Сменить почту</a>') +
    '</div>';

  window.tog = function(id){
    state[id] = !state[id];
    try { localStorage.setItem(KEY, JSON.stringify(state)); } catch (e) {}
    document.getElementById('row_' + id).classList.toggle('done', !!state[id]);
    paint();
  };
  window.swp = function(){
    try { localStorage.removeItem('m5_onb_who'); } catch (e) {}
    renderGate(false);
    return false;
  };
  window.pv = function(k){ renderTrack('pv_' + k); window.scrollTo(0,0); return false; };
  window.pvBack = function(){
    var w = ''; try { w = localStorage.getItem('m5_onb_who') || ''; } catch (e) {}
    if (PERSON[w]) renderTrack(w); else renderGate(false);
    window.scrollTo(0,0); return false;
  };
  function paint(){
    var n = 0;
    for (var i=0;i<items.length;i++) if (state[items[i].id]) n++;
    document.getElementById('pct').textContent = n + ' / ' + items.length;
    document.getElementById('fill').style.width = Math.round(n / items.length * 100) + '%';
    document.getElementById('dm').classList.toggle('on', n === items.length);
  }
  paint();
}

/* Порядок входа: 1) уже открывал здесь → сразу его страница;
   2) вошёл в хаб через welcomehero со своей почтой → узнаём молча;
   3) иначе — почтовый замок. Старые ссылки ?who= больше не работают намеренно. */
(function(){
  var w = '';
  try { w = localStorage.getItem('m5_onb_who') || ''; } catch (e) {}
  if (PERSON[w]) { renderTrack(w); return; }
  var em = '';
  try { var m = JSON.parse(localStorage.getItem('m5_member') || 'null'); if (m && m.email) em = String(m.email).trim().toLowerCase(); } catch (e) {}
  if (em && window.crypto && crypto.subtle) {
    sha256(em).then(function(h){
      var who = HASH2WHO[h];
      if (who) {
        try { localStorage.setItem('m5_onb_who', who); } catch (err) {}
        renderTrack(who);
      } else renderGate(false);
    });
  } else renderGate(false);
})();
</script>
