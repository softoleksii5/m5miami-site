<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>M5 Start — Workspace</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#20242E; --soft:#6E6656; --line:#EBE3D4; --white:#fff; --gold:#B0894F; --gold-d:#96703B;
    --serif:'Manrope',sans-serif; --sans:'Inter',sans-serif; --mono:'Space Mono',monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:var(--sans);color:var(--ink);min-height:100vh;position:relative;
    background:#F6F0E5 url('/img/vice_bg.jpg') top center/100% auto no-repeat}
  a{color:inherit;text-decoration:none}
  .wrap{max-width:1120px;margin:0 auto;padding:0 26px;position:relative;z-index:2}

  header{position:relative;z-index:3}
  .hbar{display:flex;align-items:center;justify-content:space-between;padding:22px 0}
  .logo{font-family:var(--serif);font-weight:800;font-size:24px;letter-spacing:-.01em;color:var(--ink);text-shadow:0 1px 12px rgba(246,240,229,.85)}
  .logo b{color:var(--gold)}
  .logo small{font-family:var(--mono);font-size:12px;letter-spacing:.16em;color:var(--soft);margin-left:8px}
  .hr{display:flex;align-items:center;gap:16px}
  .signout{text-shadow:0 1px 10px rgba(246,240,229,.85)}
  .priv{font-family:var(--mono);font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold-d);
    background:rgba(255,255,255,.7);padding:7px 13px;border-radius:20px;display:flex;align-items:center;gap:7px;backdrop-filter:blur(4px)}
  .priv i{width:6px;height:6px;border-radius:50%;background:var(--gold);display:inline-block}
  .signout{font-family:var(--mono);font-size:11px;letter-spacing:.1em;color:var(--soft);text-transform:uppercase;cursor:pointer}
  .signout:hover{color:var(--ink)}

  .hero{padding:34px 0 20px}
  .hero h1{font-family:var(--serif);font-weight:800;font-size:clamp(40px,6.5vw,72px);letter-spacing:-.03em;line-height:1;color:#232733}
  .hero .k{font-family:var(--mono);font-size:12px;letter-spacing:.2em;text-transform:uppercase;color:#6E6656;margin-top:16px}

  .top{display:grid;grid-template-columns:1.5fr 1fr;gap:20px;margin-top:14px}
  @media(max-width:860px){.top{grid-template-columns:1fr}}
  .agent{background:var(--white);border:1px solid rgba(176,137,79,.35);border-radius:20px;padding:28px 30px;box-shadow:0 24px 60px -30px rgba(32,36,46,.4)}
  .agent-h{display:flex;align-items:center;gap:15px;margin-bottom:6px}
  .agent-ic{width:52px;height:52px;border-radius:13px;background:linear-gradient(140deg,#FBE7D6,#F3D6BE);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;color:#C25E3A}
  .agent-h b{font-family:var(--serif);font-weight:700;font-size:22px;letter-spacing:-.01em;display:block}
  .agent-h span{font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--soft)}
  .chips{display:flex;flex-wrap:wrap;gap:10px;margin:22px 0 18px}
  .chip{background:#F5EFE6;border-radius:22px;padding:11px 17px;font-size:13.5px;color:#54503F;cursor:pointer;transition:.2s}
  .chip:hover{background:#EDE4D5}
  .ask{display:flex;align-items:center;gap:12px;border:1px solid var(--line);border-radius:14px;padding:6px 6px 6px 20px}
  .ask input{flex:1;border:none;outline:none;font-size:15px;font-family:var(--sans);background:none;color:var(--ink);padding:12px 0}
  .ask button{width:46px;height:46px;border:none;border-radius:11px;background:var(--ink);color:#fff;font-size:18px;cursor:pointer;flex-shrink:0}
  .ask button:hover{background:var(--gold-d)}

  .video{border-radius:20px;overflow:hidden;position:relative;min-height:230px;color:#fff;
    background:linear-gradient(180deg,rgba(20,18,15,.05),rgba(20,18,15,.72)),linear-gradient(120deg,#8A7250,#3C3226)}
  .video .play{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:64px;height:64px;border-radius:50%;background:rgba(255,255,255,.92);color:#20242E;display:flex;align-items:center;justify-content:center;font-size:22px;padding-left:4px}
  .video-cap{position:absolute;left:24px;right:24px;bottom:22px}
  .video-cap b{font-family:var(--serif);font-weight:700;font-size:21px;display:block}
  .video-cap span{font-family:var(--mono);font-size:11px;letter-spacing:.14em;color:#E6D9C4;text-transform:uppercase}

  .sec{font-family:var(--mono);font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--soft);margin:40px 0 16px}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
  @media(max-width:960px){.grid{grid-template-columns:1fr 1fr}}
  @media(max-width:560px){.grid{grid-template-columns:1fr}}
  .tile{background:var(--white);border:1px solid var(--line);border-radius:16px;padding:20px;cursor:pointer;transition:.2s;position:relative;min-height:148px;display:flex;flex-direction:column;overflow:hidden}
  .tile:before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--bc,transparent)}
  .tile:hover{transform:translateY(-3px);box-shadow:0 18px 36px -22px rgba(32,36,46,.45)}
  .ic{width:46px;height:46px;border-radius:11px;background:#F2ECE0;display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:auto}
  .ic.brand{background:none}
  .ic svg{display:block;width:46px;height:46px}
  .k2{font-family:var(--mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--soft);margin-top:16px}
  .tile b{font-family:var(--serif);font-weight:700;font-size:17.5px;margin-top:4px;display:flex;align-items:center;justify-content:space-between;gap:8px}
  .tile b i{font-style:normal;color:#BBB2A0;font-weight:400}
  .soon{position:absolute;top:15px;right:15px;font-family:var(--mono);font-size:9px;letter-spacing:.12em;color:#B4AC9A;border:1px solid var(--line);padding:3px 8px;border-radius:20px;text-transform:uppercase}

  footer{position:relative;z-index:2;padding:44px 0;text-align:center;font-family:var(--mono);font-size:10.5px;letter-spacing:.14em;color:var(--soft);text-transform:uppercase}
</style>
</head>
<body>

<header>
  <div class="wrap hbar">
    <a class="logo" href="/">M<b>5</b><small>START</small></a>
    <div class="hr">
      <span class="priv"><i></i><span id="privRole">Private · Team</span></span>
      <span class="signout" onclick="signout()">Sign out</span>
    </div>
  </div>
</header>

<div class="wrap">
  <div class="hero">
    <h1 id="welcome">Welcome to M5.</h1>
    <div class="k" id="sub">Your workspace</div>
  </div>

  <div class="top">
    <div class="agent">
      <div class="agent-h">
        <div class="agent-ic">✦</div>
        <div><b>Your AI agent — ask anything</b><span>Trained on M5 brand &amp; rules</span></div>
      </div>
      <div class="chips" id="chips"></div>
      <div class="ask">
        <input type="text" id="askInput" placeholder="Ask the M5 Agent...">
        <button onclick="askAgent()" aria-label="Send">→</button>
      </div>
    </div>
    <a class="video" href="#" onclick="return soon()">
      <div class="play">▶</div>
      <div class="video-cap"><b>Welcome from the founders</b><span>2 min · start here</span></div>
    </a>
  </div>

  <div class="sec">Daily work</div>
  <div class="grid" id="grid"></div>
</div>

<footer>M5 Interior Design &amp; Build · Miami · Private team hub</footer>

<script>
  /* ── фирменные логотипы сервисов (SVG со своими цветами) ── */
  var LOGOS={
    monday:'<svg viewBox="0 0 46 46"><rect width="46" height="46" rx="11" fill="#fff"/><circle cx="13" cy="24" r="6" fill="#ff3d57"/><circle cx="23" cy="24" r="6" fill="#ffcb00"/><circle cx="33" cy="24" r="6" fill="#00ca72"/></svg>',
    drive:'<svg viewBox="0 0 46 46"><rect width="46" height="46" rx="11" fill="#fff"/><g transform="translate(8,10) scale(0.345)"><path fill="#0066da" d="M6.6 66.9l3.8 6.6c.8 1.4 2 2.5 3.4 3.3L27.4 53.5H0c0 1.6.4 3.2 1.2 4.6z"/><path fill="#00ac47" d="M43.6 25L30 1.5c-1.4.8-2.6 1.9-3.4 3.3L1.2 48.7C.4 50.1 0 51.7 0 53.5h27.4z"/><path fill="#ea4335" d="M73.6 76.8c1.4-.8 2.6-1.9 3.4-3.3l1.6-2.7 7.6-13.2c.8-1.4 1.2-3 1.2-4.6H59.4l5.8 11.4z"/><path fill="#00832d" d="M43.6 25L57.2 1.5c-1.4-.8-3-1.2-4.6-1.2H34.6c-1.6 0-3.2.5-4.6 1.2z"/><path fill="#2684fc" d="M59.4 53.5H27.4L13.8 76.8c1.4.8 3 1.2 4.6 1.2h50.4c1.6 0 3.2-.5 4.6-1.2z"/><path fill="#ffba00" d="M73.4 26.5L60.7 4.8c-.8-1.4-2-2.5-3.4-3.3L43.6 25l15.8 28.5h27.2c0-1.8-.4-3.4-1.2-4.6z"/></g></svg>',
    telegram:'<svg viewBox="0 0 46 46"><rect width="46" height="46" rx="11" fill="#229ED9"/><path fill="#fff" d="M9.8 22.2l23-8.9c1.1-.4 2 .3 1.6 1.9l-3.9 18.4c-.3 1.2-1 1.5-2 .9l-5.6-4.1-2.7 2.6c-.3.3-.6.5-1.1.5l.4-5.8L30.4 17c.5-.4-.1-.7-.8-.3L16 25.1l-5.7-1.8c-1.2-.4-1.2-1.2.5-1.1z"/></svg>',
    gcal:'<svg viewBox="0 0 46 46"><rect width="46" height="46" rx="11" fill="#fff"/><rect x="11" y="12" width="24" height="23" rx="3" fill="#fff" stroke="#4285F4" stroke-width="2.4"/><text x="23" y="30" font-family="Arial,Helvetica,sans-serif" font-size="12.5" font-weight="700" fill="#4285F4" text-anchor="middle">31</text></svg>',
    quickbooks:'<svg viewBox="0 0 46 46"><rect width="46" height="46" rx="11" fill="#2CA01C"/><circle cx="23" cy="23" r="12" fill="none" stroke="#fff" stroke-width="3.4"/><rect x="21.3" y="13" width="3.4" height="20" fill="#fff"/></svg>',
    jobtread:'<svg viewBox="0 0 46 46"><rect width="46" height="46" rx="11" fill="#F26722"/><text x="23" y="30" font-family="Arial" font-size="16" font-weight="800" fill="#fff" text-anchor="middle">JT</text></svg>',
    heygen:'<svg viewBox="0 0 46 46"><rect width="46" height="46" rx="11" fill="#5B3DF5"/><text x="23" y="31" font-family="Arial" font-size="18" font-weight="800" fill="#fff" text-anchor="middle">H</text></svg>',
    openphone:'<svg viewBox="0 0 46 46"><rect width="46" height="46" rx="11" fill="#6B5FFF"/><path fill="#fff" d="M19 14c-1 0-1.9.7-2.1 1.7l-.9 3.7c-.2.8.1 1.5.7 2l2.1 1.7c-.2 1.4 2.3 3.9 3.7 3.7l1.7 2.1c.5.6 1.2.9 2 .7l3.7-.9c1-.2 1.7-1.1 1.7-2.1v-2.7c0-.9-.6-1.6-1.5-1.8l-2.4-.4c-.6-.1-1.1.1-1.5.5l-.8.8c-1.6-.9-2.9-2.2-3.8-3.8l.8-.8c.4-.4.6-.9.5-1.5l-.4-2.4c-.2-.9-.9-1.5-1.8-1.5z"/></svg>',
    houzz:'<svg viewBox="0 0 46 46"><rect width="46" height="46" rx="11" fill="#4DBC15"/><path fill="#fff" d="M23 12l-8 4.6v13.4h5.2v-6.2h5.6v6.2H31V16.6z"/></svg>'
  };
  var BC={monday:'#ff3d57',drive:'#00ac47',telegram:'#229ED9',gcal:'#4285F4',quickbooks:'#2CA01C',jobtread:'#F26722',heygen:'#5B3DF5',openphone:'#6B5FFF',houzz:'#4DBC15'};

  var ROLES={
    smm:{label:'SMM',sub:'Your SMM &amp; content workspace',
      chips:['My score this week','Is this post on-brand?','Take the onboarding quiz'],
      tiles:[{b:'monday',k:'My tasks',t:'Monday.com'},{ic:'🗓',k:'Scheduler',t:'Auto-posting'},{b:'heygen',k:'HeyGen',t:'AI avatars'},{b:'telegram',k:'M5 Pulse',t:'Team channel'},{ic:'📸',k:'Channels',t:'IG · TikTok · YT'},{b:'drive',k:'Drive',t:'Assets &amp; docs'},{ic:'📖',k:'Playbook',t:'Brand &amp; rules'},{ic:'📈',k:'My growth',t:'Level A → B → M'}]},
    sales:{label:'Sales',sub:'Your sales workspace',
      chips:['My pipeline','Today’s leads','Objection scripts'],
      tiles:[{b:'monday',k:'CRM',t:'Monday.com'},{b:'openphone',k:'Calls',t:'OpenPhone'},{b:'gcal',k:'Calendar',t:'Consultations'},{ic:'🧰',k:'Sales Kit',t:'Scripts &amp; pitch'},{ic:'🤝',k:'Partners',t:'Realtors &amp; brokers'},{b:'telegram',k:'M5 Pulse',t:'Team channel'},{b:'drive',k:'Drive',t:'Docs'},{ic:'📈',k:'My growth',t:'Level A → B → M'}]},
    designer:{label:'Designer',sub:'Your design workspace',
      chips:['My projects','Material library','Brand guide'],
      tiles:[{b:'monday',k:'Boards',t:'Monday.com'},{ic:'🎨',k:'Design',t:'3D &amp; tools'},{b:'drive',k:'Drive',t:'Assets &amp; docs'},{b:'houzz',k:'Houzz',t:'Pro profile'},{b:'telegram',k:'M5 Pulse',t:'Team channel'},{ic:'📖',k:'Playbook',t:'Brand &amp; rules'},{b:'gcal',k:'Calendar',t:'Meetings'},{ic:'📈',k:'My growth',t:'Level A → B → M'}]},
    pm:{label:'Project Manager',sub:'Your production workspace',
      chips:['My projects','Today’s site tasks','Change orders'],
      tiles:[{b:'jobtread',k:'Production',t:'JobTread'},{b:'monday',k:'Boards',t:'Monday.com'},{ic:'📐',k:'Supervision',t:'Site QC'},{ic:'📄',k:'Permits',t:'Miami-Dade'},{b:'drive',k:'Drive',t:'Docs &amp; photos'},{b:'telegram',k:'M5 Pulse',t:'Team channel'},{b:'gcal',k:'Calendar',t:'Meetings'},{ic:'📈',k:'My growth',t:'Level A → B → M'}]},
    director:{label:'Director',sub:'Your command center',
      chips:['Margin &amp; pipeline','Stock levels','This week'],
      tiles:[{b:'jobtread',k:'Production',t:'JobTread'},{b:'monday',k:'CRM',t:'Full pipeline'},{ic:'📦',k:'Inventory',t:'Materials &amp; stock'},{ic:'📄',k:'Permits',t:'Miami-Dade'},{ic:'👥',k:'People',t:'Team &amp; roles'},{b:'quickbooks',k:'Finance',t:'QuickBooks'},{b:'telegram',k:'M5 Pulse',t:'Team channel'},{b:'drive',k:'Drive',t:'Company docs'}]},
    team:{label:'Team',sub:'Your workspace',
      chips:['My tasks','Knowledge base','Ask anything'],
      tiles:[{b:'monday',k:'Boards',t:'Monday.com'},{b:'drive',k:'Drive',t:'Knowledge base'},{b:'telegram',k:'M5 Pulse',t:'Team channel'},{ic:'✦',k:'AI Agent',t:'M5 assistant'},{b:'gcal',k:'Calendar',t:'Meetings'},{ic:'📖',k:'Playbook',t:'Brand &amp; rules'}]}
  };
  function detectRole(){
    var m=location.pathname.toLowerCase().match(/champion([a-z]+)/); var r=m?m[1]:'';
    if(!ROLES[r]){var q=(location.search.match(/[?&]role=([^&]*)/)||[])[1]||''; if(ROLES[q])r=q;}
    if(!ROLES[r]){try{var mm=JSON.parse(localStorage.getItem('m5_member')||'null'); if(mm&&ROLES[mm.role])r=mm.role;}catch(e){}}
    return ROLES[r]?r:'team';
  }
  var role=detectRole(), cfg=ROLES[role];
  var member=null; try{member=JSON.parse(localStorage.getItem('m5_member')||'null');}catch(e){}
  document.getElementById('privRole').textContent='Private · '+cfg.label;
  document.getElementById('welcome').innerHTML=(member&&member.name)?('Welcome, '+member.name.split(' ')[0]+'.'):'Welcome to M5.';
  document.getElementById('sub').innerHTML=cfg.sub;
  document.getElementById('chips').innerHTML=cfg.chips.map(function(c){return '<span class="chip" onclick="askAgent(this.textContent)">'+c+'</span>';}).join('');
  document.getElementById('grid').innerHTML=cfg.tiles.map(function(t){
    var icon = t.b ? '<div class="ic brand">'+LOGOS[t.b]+'</div>' : '<div class="ic">'+(t.ic||'•')+'</div>';
    var col = t.b ? BC[t.b] : '#E6DECB';
    return '<a class="tile" style="--bc:'+col+'" href="#" onclick="return soon()">'+icon+
      '<div class="k2">'+t.k+'</div><b>'+t.t+' <i>→</i></b><span class="soon">Soon</span></a>';
  }).join('');
  function soon(){ alert('This link is being set up — it will open the live tool soon.'); return false; }
  function askAgent(q){ alert('The M5 AI agent connects here soon.'+(q?('\n\n“'+q+'”'):'')); }
  function signout(){ try{localStorage.removeItem('m5_member');}catch(e){}; location.href='/welcomehero'; }
</script>
</body>
</html>
