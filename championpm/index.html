<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>M5 Start — Workspace</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#20242E; --soft:#7A7466; --line:#EBE4D7; --white:#fff; --gold:#B0894F; --gold-d:#96703B;
    --serif:'Manrope',sans-serif; --sans:'Inter',sans-serif; --mono:'Space Mono',monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:var(--sans);color:var(--ink);min-height:100vh;position:relative;overflow-x:hidden;
    background:
      linear-gradient(180deg,rgba(244,238,228,.34) 0%,rgba(244,238,228,.5) 55%,rgba(240,233,221,.62) 100%),
      url('/img/plaster_bg.jpg') center/cover fixed no-repeat;
    background-color:#EFE9DE}
  a{color:inherit;text-decoration:none}
  .wrap{max-width:1120px;margin:0 auto;padding:0 26px;position:relative;z-index:2}

  header{position:relative;z-index:3}
  .hbar{display:flex;align-items:center;justify-content:space-between;padding:22px 0}
  .logo{font-family:var(--serif);font-weight:800;font-size:24px;letter-spacing:-.01em}
  .logo b{color:var(--gold);font-weight:800}
  .logo small{font-family:var(--mono);font-size:12px;letter-spacing:.16em;color:var(--soft);margin-left:8px}
  .hr{display:flex;align-items:center;gap:16px}
  .priv{font-family:var(--mono);font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold-d);
    background:rgba(176,137,79,.12);padding:7px 13px;border-radius:20px;display:flex;align-items:center;gap:7px}
  .priv i{width:6px;height:6px;border-radius:50%;background:var(--gold);display:inline-block}
  .signout{font-family:var(--mono);font-size:11px;letter-spacing:.1em;color:var(--soft);text-transform:uppercase;cursor:pointer}
  .signout:hover{color:var(--ink)}

  .hero{padding:40px 0 20px}
  .hero h1{font-family:var(--serif);font-weight:800;font-size:clamp(40px,6.5vw,72px);letter-spacing:-.03em;line-height:1}
  .hero .k{font-family:var(--mono);font-size:12px;letter-spacing:.2em;text-transform:uppercase;color:var(--soft);margin-top:16px}

  .top{display:grid;grid-template-columns:1.5fr 1fr;gap:20px;margin-top:14px}
  @media(max-width:860px){.top{grid-template-columns:1fr}}
  .agent{background:var(--white);border:1px solid rgba(176,137,79,.4);border-radius:20px;padding:28px 30px;box-shadow:0 20px 50px -30px rgba(32,36,46,.3)}
  .agent-h{display:flex;align-items:center;gap:15px;margin-bottom:6px}
  .agent-ic{width:52px;height:52px;border-radius:13px;background:linear-gradient(140deg,#FBE7D6,#F3D6BE);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
  .agent-h b{font-family:var(--serif);font-weight:700;font-size:22px;letter-spacing:-.01em;display:block}
  .agent-h span{font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--soft)}
  .chips{display:flex;flex-wrap:wrap;gap:10px;margin:22px 0 18px}
  .chip{background:#F5EFE6;border-radius:22px;padding:11px 17px;font-size:13.5px;color:#54503F;cursor:pointer;transition:.2s}
  .chip:hover{background:#EDE4D5}
  .ask{display:flex;align-items:center;gap:12px;border:1px solid var(--line);border-radius:14px;padding:6px 6px 6px 20px}
  .ask input{flex:1;border:none;outline:none;font-size:15px;font-family:var(--sans);background:none;color:var(--ink);padding:12px 0}
  .ask button{width:46px;height:46px;border:none;border-radius:11px;background:var(--ink);color:#fff;font-size:18px;cursor:pointer;flex-shrink:0}
  .ask button:hover{background:var(--gold-d)}

  .video{border-radius:20px;overflow:hidden;position:relative;min-height:230px;color:#fff;
    background:linear-gradient(180deg,rgba(20,18,15,.05),rgba(20,18,15,.72)),linear-gradient(120deg,#8A7250,#3C3226)}
  .video .play{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:64px;height:64px;border-radius:50%;background:rgba(255,255,255,.92);color:#20242E;display:flex;align-items:center;justify-content:center;font-size:22px;padding-left:4px}
  .video-cap{position:absolute;left:24px;right:24px;bottom:22px}
  .video-cap b{font-family:var(--serif);font-weight:700;font-size:21px;display:block}
  .video-cap span{font-family:var(--mono);font-size:11px;letter-spacing:.14em;color:#E6D9C4;text-transform:uppercase}

  .sec{font-family:var(--mono);font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--soft);margin:40px 0 16px}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
  @media(max-width:960px){.grid{grid-template-columns:1fr 1fr}}
  @media(max-width:560px){.grid{grid-template-columns:1fr}}
  .tile{background:var(--white);border:1px solid var(--line);border-radius:16px;padding:22px;cursor:pointer;transition:.2s;position:relative;min-height:150px;display:flex;flex-direction:column}
  .tile:hover{transform:translateY(-3px);box-shadow:0 18px 36px -22px rgba(32,36,46,.4)}
  .tile .ic{width:44px;height:44px;border-radius:11px;background:#F5EFE6;display:flex;align-items:center;justify-content:center;font-size:21px;margin-bottom:auto}
  .tile .k2{font-family:var(--mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--soft);margin-top:16px}
  .tile b{font-family:var(--serif);font-weight:700;font-size:18px;margin-top:4px;display:flex;align-items:center;justify-content:space-between}
  .tile b i{font-style:normal;color:var(--soft);font-weight:400}
  .soon{position:absolute;top:16px;right:16px;font-family:var(--mono);font-size:9px;letter-spacing:.12em;color:#B4AC9A;border:1px solid var(--line);padding:3px 8px;border-radius:20px;text-transform:uppercase}

  footer{position:relative;z-index:2;padding:44px 0;text-align:center;font-family:var(--mono);font-size:10.5px;letter-spacing:.14em;color:var(--soft);text-transform:uppercase}
</style>
</head>
<body>

<header>
  <div class="wrap hbar">
    <a class="logo" href="/">M<b>5</b><small>START</small></a>
    <div class="hr">
      <span class="priv"><i></i><span id="privRole">Private · Team</span></span>
      <span class="signout" onclick="signout()">Sign out</span>
    </div>
  </div>
</header>

<div class="wrap">
  <div class="hero">
    <h1 id="welcome">Welcome to M5.</h1>
    <div class="k" id="sub">Your workspace</div>
  </div>

  <div class="top">
    <div class="agent">
      <div class="agent-h">
        <div class="agent-ic">✦</div>
        <div><b>Your AI agent — ask anything</b><span>Trained on M5 brand &amp; rules</span></div>
      </div>
      <div class="chips" id="chips"></div>
      <div class="ask">
        <input type="text" id="askInput" placeholder="Ask the M5 Agent...">
        <button onclick="askAgent()" aria-label="Send">→</button>
      </div>
    </div>
    <a class="video" href="#" onclick="return soon()">
      <div class="play">▶</div>
      <div class="video-cap"><b>Welcome from the founders</b><span>2 min · start here</span></div>
    </a>
  </div>

  <div class="sec">Daily work</div>
  <div class="grid" id="grid"></div>
</div>

<footer>M5 Interior Design &amp; Build · Miami · Private team hub</footer>

<script>
  var ROLES={
    smm:{label:'SMM',sub:'Your SMM &amp; content workspace',
      chips:['My score this week','Is this post on-brand?','Take the onboarding quiz'],
      tiles:[['🗂','My tasks','Monday.com'],['📅','Scheduler','Auto-posting'],['🎥','HeyGen','AI avatars'],['✈️','M5 Pulse','Team channel'],['📷','Channels','IG · TikTok · YT'],['📁','Drive','Assets &amp; docs'],['📖','Playbook','Brand &amp; rules'],['📈','My growth','Level A → B → M']]},
    sales:{label:'Sales',sub:'Your sales workspace',
      chips:['My pipeline','Today’s leads','Objection scripts'],
      tiles:[['📋','CRM','Monday.com'],['📞','Calls','OpenPhone'],['📅','Calendar','Consultations'],['🧰','Sales Kit','Scripts &amp; pitch'],['🤝','Partners','Realtors &amp; brokers'],['✈️','M5 Pulse','Team channel'],['📁','Drive','Docs'],['📈','My growth','Level A → B → M']]},
    designer:{label:'Designer',sub:'Your design workspace',
      chips:['My projects','Material library','Brand guide'],
      tiles:[['🗂','Boards','Monday.com'],['🎨','Design','3D &amp; tools'],['📁','Drive','Assets &amp; docs'],['🖼','Portfolio','Gallery'],['✈️','M5 Pulse','Team channel'],['📖','Playbook','Brand &amp; rules'],['📅','Calendar','Meetings'],['📈','My growth','Level A → B → M']]},
    pm:{label:'Project Manager',sub:'Your production workspace',
      chips:['My projects','Today’s site tasks','Change orders'],
      tiles:[['🏗','Production','JobTread'],['🗂','Boards','Monday.com'],['📐','Supervision','Site QC'],['📄','Permits','Miami-Dade'],['📁','Drive','Docs &amp; photos'],['✈️','M5 Pulse','Team channel'],['📅','Calendar','Meetings'],['📈','My growth','Level A → B → M']]},
    director:{label:'Director',sub:'Your command center',
      chips:['Margin &amp; pipeline','Stock levels','This week'],
      tiles:[['🏗','Production','JobTread'],['📋','CRM','Full pipeline'],['📦','Inventory','Materials &amp; stock'],['📄','Permits','Miami-Dade'],['👥','People','Team &amp; roles'],['💵','Finance','QuickBooks'],['✈️','M5 Pulse','Team channel'],['📁','Drive','Company docs']]},
    team:{label:'Team',sub:'Your workspace',
      chips:['My tasks','Knowledge base','Ask anything'],
      tiles:[['🗂','Boards','Monday.com'],['📁','Drive','Knowledge base'],['✈️','M5 Pulse','Team channel'],['✦','AI Agent','M5 assistant'],['📅','Calendar','Meetings'],['📖','Playbook','Brand &amp; rules']]}
  };
  function detectRole(){
    var m=location.pathname.toLowerCase().match(/champion([a-z]+)/);
    var r=m?m[1]:'';
    if(!ROLES[r]){ var q=(location.search.match(/[?&]role=([^&]*)/)||[])[1]||''; if(ROLES[q])r=q; }
    if(!ROLES[r]){ try{var mm=JSON.parse(localStorage.getItem('m5_member')||'null'); if(mm&&ROLES[mm.role])r=mm.role;}catch(e){} }
    return ROLES[r]?r:'team';
  }
  var role=detectRole(), cfg=ROLES[role];
  var member=null; try{member=JSON.parse(localStorage.getItem('m5_member')||'null');}catch(e){}
  document.getElementById('privRole').textContent='Private · '+cfg.label;
  document.getElementById('welcome').innerHTML = (member&&member.name)?('Welcome, '+member.name.split(' ')[0]+'.'):'Welcome to M5.';
  document.getElementById('sub').innerHTML = cfg.sub;
  document.getElementById('chips').innerHTML = cfg.chips.map(function(c){return '<span class="chip" onclick="askAgent(this.textContent)">'+c+'</span>';}).join('');
  document.getElementById('grid').innerHTML = cfg.tiles.map(function(t){
    return '<a class="tile" href="#" onclick="return soon()"><div class="ic">'+t[0]+'</div>'+
      '<div class="k2">'+t[1]+'</div><b>'+t[2]+' <i>→</i></b><span class="soon">Soon</span></a>';
  }).join('');
  function soon(){ alert('This link is being set up — it will open the live tool soon.'); return false; }
  function askAgent(q){ alert('The M5 AI agent connects here soon.'+(q?('\n\n“'+q+'”'):'')); }
  function signout(){ try{localStorage.removeItem('m5_member');}catch(e){}; location.href='/welcomehero'; }
</script>
</body>
</html>
