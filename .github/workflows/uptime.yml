name: Uptime check
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
permissions:
  issues: write
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check m5miami.com
        id: check
        run: |
          ok=1
          for i in 1 2 3; do
            code=$(curl -s -o /tmp/page.html -w "%{http_code}" --max-time 20 https://m5miami.com/ || echo 000)
            if [ "$code" = "200" ] && grep -q "M5" /tmp/page.html; then ok=0; break; fi
            sleep 20
          done
          echo "status=$code" >> "$GITHUB_OUTPUT"
          exit $ok
      - name: Open issue if down
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          existing=$(gh issue list -R "$GITHUB_REPOSITORY" --state open --search "m5miami.com is DOWN in:title" --json number -q '.[0].number')
          if [ -z "$existing" ]; then
            gh issue create -R "$GITHUB_REPOSITORY" \
              -t "🔴 m5miami.com is DOWN (HTTP ${{ steps.check.outputs.status }})" \
              -b "Uptime check failed 3 times in a row at $(date -u '+%Y-%m-%d %H:%M UTC'). Check GitHub Pages status and DNS."
          fi
      - name: Close issue if up again
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          num=$(gh issue list -R "$GITHUB_REPOSITORY" --state open --search "m5miami.com is DOWN in:title" --json number -q '.[0].number')
          [ -n "$num" ] && gh issue close -R "$GITHUB_REPOSITORY" "$num" -c "✅ Site is back up ($(date -u '+%H:%M UTC'))." || true
